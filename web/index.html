<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大六壬 - 神課排盤系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #8B4513;
            --primary-light: #A0522D;
            --secondary: #D2691E;
            --accent: #C9A961;
            --bg-paper: #F5F0E8;
            --bg-dark: #1A1A2E;
            --text-primary: #2C2415;
            --text-secondary: #5C4A35;
            --text-muted: #8B7355;
            --border: #D4C4B0;
            --shadow: rgba(139, 69, 19, 0.15);
            --ji: #2E7D32;
            --xiong: #C62828;
            --ping: #757575;
        }
        
        body {
            font-family: 'Noto Serif TC', 'Source Han Serif TC', 'SimSun', serif;
            background: var(--bg-paper);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
            background: linear-gradient(180deg, var(--bg-paper) 0%, #EDE8E0 100%);
            border-bottom: 3px double var(--primary);
            position: relative;
        }
        
        .header::before,
        .header::after {
            content: '☯';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: var(--accent);
            opacity: 0.5;
        }
        
        .header::before { left: 15%; }
        .header::after { right: 15%; }
        
        .header h1 {
            font-size: 2.8rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px var(--shadow);
        }
        
        .header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 4px;
        }
        
        /* Input Section */
        .input-section {
            background: #FFF;
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 35px;
            box-shadow: 0 8px 32px var(--shadow);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 0.95rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group label::before {
            content: '◆';
            color: var(--accent);
            font-size: 0.7rem;
        }
        
        .form-group input, .form-group textarea {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: #FAFAF8;
            color: var(--text-primary);
            font-size: 1.05rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(201, 169, 97, 0.15);
            background: #FFF;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #FFF;
            border: none;
            padding: 16px 50px;
            font-size: 1.15rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.3);
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(-1px);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid rgba(201, 169, 97, 0.3);
            border-top: 4px solid #c9a961;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Results */
        .results {
            display: none;
        }
        
        .results.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: #FFF;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow);
        }
        
        .result-card h3 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .result-card h3::before {
            content: '';
            width: 6px;
            height: 24px;
            background: var(--accent);
            border-radius: 3px;
        }
        
        /* Pillars */
        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .pillar-item {
            background: linear-gradient(135deg, #FAFAF8 0%, #F5F0E8 100%);
            padding: 20px 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .pillar-item:hover {
            border-color: var(--accent);
            transform: scale(1.03);
        }
        
        .pillar-item.day {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFEFD5 100%);
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(201, 169, 97, 0.2);
        }
        
        .pillar-item.day::after {
            content: '日主';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.7rem;
            color: var(--primary);
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .pillar-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .pillar-value {
            font-size: 1.9rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        /* Pan Display */
        .pan-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .pan-section {
            background: linear-gradient(135deg, #FAFAF8 0%, #F5F0E8 100%);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid var(--border);
        }
        
        .pan-section h4 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--border);
        }
        
        .pan-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .pan-cell {
            background: #FFF;
            padding: 14px 8px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .pan-cell:hover {
            background: #FFF8E7;
            border-color: var(--accent);
            transform: scale(1.05);
        }
        
        .pan-cell .branch {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
        }
        
        .pan-cell .general {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Four Ke */
        .ke-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        
        .ke-table th {
            background: var(--primary);
            color: #FFF;
            padding: 14px;
            text-align: center;
            font-weight: 600;
        }
        
        .ke-table th:first-child {
            border-radius: 10px 0 0 10px;
        }
        
        .ke-table th:last-child {
            border-radius: 0 10px 10px 0;
        }
        
        .ke-table td {
            padding: 16px 12px;
            text-align: center;
            background: #FAFAF8;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        
        .ke-table tr:hover td {
            background: #FFF8E7;
        }
        
        .ke-table td:first-child {
            border-left: 1px solid var(--border);
            border-radius: 10px 0 0 10px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .ke-table td:last-child {
            border-right: 1px solid var(--border);
            border-radius: 0 10px 10px 0;
        }
        
        .ke-meaning {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 200px;
            line-height: 1.4;
        }
        
        /* San Chuan */
        .chuanchuan-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        
        .chuanchuan-item {
            background: linear-gradient(135deg, #FAFAF8 0%, #F5F0E8 100%);
            padding: 25px 20px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .chuanchuan-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow);
        }
        
        .chuanchuan-item.chu {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFEFD5 100%);
            border-color: var(--accent);
        }
        
        .chuanchuan-item.chu::before {
            content: '發用';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: var(--primary);
            padding: 4px 16px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .chuanchuan-name {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .chuanchuan-branch {
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .chuanchuan-general {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
        
        .chuanchuan-tags {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .tag.empty {
            background: #FFEBEE;
            color: var(--xiong);
            border: 1px solid #FFCDD2;
        }
        
        .tag.horse {
            background: #E3F2FD;
            color: #1565C0;
            border: 1px solid #BBDEFB;
        }
        
        .tag.taohua {
            background: #FCE4EC;
            color: #C2185B;
            border: 1px solid #F8BBD9;
        }
        
        .method-text {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            margin-top: 15px;
            padding: 12px;
            background: #FAFAF8;
            border-radius: 10px;
            font-size: 0.95rem;
        }
        
        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: linear-gradient(135deg, #FAFAF8 0%, #F5F0E8 100%);
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        
        .info-item:hover {
            background: #FFF8E7;
            border-color: var(--accent);
        }
        
        .info-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .info-value {
            color: var(--primary);
            font-weight: 600;
            font-size: 1.05rem;
        }
        
        /* Judgment */
        .judgment-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .xiongji {
            display: inline-block;
            padding: 8px 30px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }
        
        .xiongji.ji {
            background: #E8F5E9;
            color: var(--ji);
            border: 2px solid #A5D6A7;
        }
        
        .xiongji.xiong {
            background: #FFEBEE;
            color: var(--xiong);
            border: 2px solid #FFCDD2;
        }
        
        .xiongji.ping {
            background: #F5F5F5;
            color: var(--ping);
            border: 2px solid #E0E0E0;
        }
        
        .judgment-title {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
        }
        
        /* Error */
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }
        
        /* KeTi Detail */
        .ketidetail-section {
            background: linear-gradient(135deg, #FAFAF8 0%, #F5F0E8 100%);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin: 25px 0;
        }
        
        .ketidetail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }
        
        .ketidetail-category {
            background: var(--primary);
            color: #FFF;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .ketidetail-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .ketidetail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .ketidetail-block {
            background: #FFF;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .ketidetail-block h4 {
            color: var(--primary);
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ketidetail-block h4::before {
            content: '◆';
            color: var(--accent);
            font-size: 0.6rem;
        }
        
        .ketidetail-block p,
        .ketidetail-block li {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }
        
        .ketidetail-features {
            grid-column: 1 / -1;
        }
        
        .ketidetail-features ul {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
            padding: 0;
            list-style: none;
        }
        
        .ketidetail-features li {
            background: #FFF;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }
        
        .ketidetail-examples {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFEFD5 100%);
        }
        
        .ketidetail-examples ul {
            margin-top: 12px;
            padding-left: 20px;
        }
        
        .ketidetail-examples li {
            margin: 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .duanyu-section {
            background: #FFF;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .duanyu-section h4 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .duanyu-section p {
            color: var(--text-secondary);
            padding: 12px 0;
            border-bottom: 1px dashed var(--border);
        }
        
        .duanyu-section p:last-child {
            border-bottom: none;
        }
        
        /* Error */
        .error-message {
            background: #FFEBEE;
            border: 2px solid #FFCDD2;
            color: var(--xiong);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 600;
        }
        
        .error-message.active {
            display: block;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .yongshen-section {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFEFD5 100%);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 25px;
            margin: 25px 0;
        }
        
        .yongshen-section h4 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .yongshen-section h4::before {
            content: '◆';
            color: var(--primary);
        }
        
        .yongshen-content p {
            color: var(--text-secondary);
            margin: 10px 0;
            line-height: 1.8;
        }
        
        .yongshen-content strong {
            color: var(--primary);
        }
        
        .yongshen-analysis {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }
        
        .yongshen-analysis ul {
            margin-top: 10px;
            padding-left: 20px;
        }
        
        .yongshen-analysis li {
            color: var(--text-secondary);
            margin: 5px 0;
        }
        
        .chuanchuan-role {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 5px;
            background: rgba(201, 169, 97, 0.15);
            padding: 2px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .chuanchuan-relation {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 5px 0;
        }
        
        .chuanchuan-explanation {
            background: #FFF;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            text-align: left;
        }
        
        .chuanchuan-explanation p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }
        
        .chuanchuan-advice {
            color: var(--primary) !important;
            font-weight: 600;
            margin-top: 8px !important;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .ketidetail-row {
                grid-template-columns: 1fr;
            }
            
            .ketidetail-features ul {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
            
            .header::before,
            .header::after {
                display: none;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .pillars-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .pan-container {
                grid-template-columns: 1fr;
            }
            
            .chuanchuan-container {
                grid-template-columns: 1fr;
            }
            
            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .ketidetail-features ul {
                grid-template-columns: 1fr;
            }
            
            .input-section {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .pillars-grid,
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .pan-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>大六壬 神課排盤</h1>
            <p>三式之首 · 百占百驗 · 來人不用問</p>
        </header>
        
        <section class="input-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="time">時間</label>
                    <input type="time" id="time" required value="12:00">
                </div>
                <div class="form-group">
                    <label for="questionType">問題類型</label>
                    <select id="questionType" style="padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; background: #FAFAF8; color: var(--text-primary); font-size: 1.05rem; font-family: inherit; cursor: pointer;">
                        <option value="">一般占斷</option>
                        <option value="財運">財運</option>
                        <option value="官運">官運</option>
                        <option value="婚姻">婚姻</option>
                        <option value="疾病">疾病</option>
                        <option value="出行">出行</option>
                        <option value="訴訟">訴訟</option>
                        <option value="尋人">尋人</option>
                        <option value="失物">失物</option>
                        <option value="考試">考試</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="question">占事詳情（可選）</label>
                    <input type="text" id="question" placeholder="請輸入所占之事的具體描述...">
                </div>
            </div>
            <button class="btn-submit" onclick="performDivination()">開始排盤</button>
        </section>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在推演天地盤、四課三傳...</p>
        </div>
        
        <div class="error-message" id="error"></div>
        
        <section class="results" id="results">
            <!-- 四柱 -->
            <div class="result-card">
                <h3>四柱八字</h3>
                <div class="pillars-grid" id="pillars">
                    <!-- 動態填充 -->
                </div>
            </div>
            
            <!-- 課盤資訊 -->
            <div class="result-card">
                <h3>課盤資訊</h3>
                <div class="info-grid" id="info">
                    <!-- 動態填充 -->
                </div>
            </div>
            
            <!-- 天地盤 -->
            <div class="result-card">
                <h3>天地盤 · 十二天將</h3>
                <div class="pan-container" id="pan">
                    <!-- 動態填充 -->
                </div>
            </div>
            
            <!-- 四課 -->
            <div class="result-card">
                <h3>四課</h3>
                <table class="ke-table" id="fourKe">
                    <!-- 動態填充 -->
                </table>
            </div>
            
            <!-- 三傳 -->
            <div class="result-card">
                <h3>三傳</h3>
                <div class="chuanchuan-container" id="sanChuan">
                    <!-- 動態填充 -->
                </div>
            </div>
            
            <!-- 課體與判斷 -->
            <div class="result-card">
                <h3>課體判斷</h3>
                <div class="judgment-box" id="judgment">
                    <!-- 動態填充 -->
                </div>
            </div>
        </section>
    </div>
    
    <script>
        // 設置默認日期為今天
        document.getElementById('date').valueAsDate = new Date();
        
        const API_URL = '/api/v1/divination';
        
        async function performDivination() {
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const question = document.getElementById('question').value;
            const questionType = document.getElementById('questionType').value;
            
            if (!date || !time) {
                showError('請輸入日期和時間');
                return;
            }
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('error').classList.remove('active');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ date, time, question, question_type: questionType })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.message || '排盤失敗');
                }
                
                displayResults(data.data);
                
            } catch (error) {
                showError('排盤失敗: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            setTimeout(() => errorEl.classList.remove('active'), 5000);
        }
        
        function displayResults(data) {
            // 四柱
            document.getElementById('pillars').innerHTML = `
                <div class="pillar-item">
                    <div class="pillar-label">年柱</div>
                    <div class="pillar-value">${data.YearPillar}</div>
                </div>
                <div class="pillar-item">
                    <div class="pillar-label">月柱</div>
                    <div class="pillar-value">${data.MonthPillar}</div>
                </div>
                <div class="pillar-item day">
                    <div class="pillar-label">日柱</div>
                    <div class="pillar-value">${data.DayPillar}</div>
                </div>
                <div class="pillar-item">
                    <div class="pillar-label">時柱</div>
                    <div class="pillar-value">${data.HourPillar}</div>
                </div>
            `;
            
            // 課盤資訊
            document.getElementById('info').innerHTML = `
                <div class="info-item"><span class="info-label">月將</span><span class="info-value">${data.MonthGeneral}</span></div>
                <div class="info-item"><span class="info-label">占時</span><span class="info-value">${data.HourBranch}時</span></div>
                <div class="info-item"><span class="info-label">晝夜</span><span class="info-value">${data.DayGeneralName}</span></div>
                <div class="info-item"><span class="info-label">貴人位</span><span class="info-value">${data.GuiRenPosition}</span></div>
                <div class="info-item"><span class="info-label">空亡</span><span class="info-value">${data.VoidBranches.join('、')}</span></div>
                <div class="info-item"><span class="info-label">驛馬</span><span class="info-value">${data.YiMa}</span></div>
                <div class="info-item"><span class="info-label">桃花</span><span class="info-value">${data.TaoHua}</span></div>
                <div class="info-item"><span class="info-label">課體</span><span class="info-value">${data.KeTi}</span></div>
            `;
            
            // 天地盤
            document.getElementById('pan').innerHTML = `
                <div class="pan-section">
                    <h4>地盤（固定）</h4>
                    <div class="pan-grid">
                        ${data.DiPan.map((b, i) => `
                            <div class="pan-cell">
                                <div class="branch">${b}</div>
                                <div class="general">${data.TianJiang[i]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="pan-section">
                    <h4>天盤（月將加時）</h4>
                    <div class="pan-grid">
                        ${data.TianPan.map((b, i) => `
                            <div class="pan-cell">
                                <div class="branch">${b}</div>
                                <div class="general">${data.TianJiang[i]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // 四課
            document.getElementById('fourKe').innerHTML = `
                <thead>
                    <tr>
                        <th>課序</th>
                        <th>意義</th>
                        <th>下神</th>
                        <th>上神</th>
                        <th>下神天將</th>
                        <th>上神天將</th>
                        <th>十神</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.FourKe.map(ke => `
                        <tr>
                            <td>第${ke.Number}課</td>
                            <td class="ke-meaning">${ke.Meaning}</td>
                            <td>${ke.Down}</td>
                            <td>${ke.Up}</td>
                            <td>${ke.DownGeneral}</td>
                            <td>${ke.UpGeneral}</td>
                            <td>${ke.Relation}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            
            // 三傳
            const chuanItems = ['Chu', 'Zhong', 'Mo'];
            const chuanNames = ['初傳（發用）', '中傳（移易）', '末傳（歸計）'];
            const chuanRoles = ['起因/發端', '過程/變化', '結果/歸宿'];
            const chuanDetails = ['ChuDetail', 'ZhongDetail', 'MoDetail'];
            
            document.getElementById('sanChuan').innerHTML = `
                ${chuanItems.map((item, idx) => `
                    <div class="chuanchuan-item ${item === 'Chu' ? 'chu' : ''}">
                        <div class="chuanchuan-name">${chuanNames[idx]}</div>
                        <div class="chuanchuan-role">${chuanRoles[idx]}</div>
                        <div class="chuanchuan-branch">${data.SanChuan[item].Branch}</div>
                        <div class="chuanchuan-general">${data.SanChuan[item].General}</div>
                        <div class="chuanchuan-relation">十神：${data.SanChuan[item].Relation}</div>
                        <div class="chuanchuan-tags">
                            ${data.SanChuan[item].IsEmpty ? '<span class="tag empty">空亡</span>' : ''}
                            ${data.SanChuan[item].IsHorse ? '<span class="tag horse">驛馬</span>' : ''}
                            ${data.SanChuan[item].IsTaoHua ? '<span class="tag taohua">桃花</span>' : ''}
                        </div>
                        ${data.SanChuan[chuanDetails[idx]] ? `
                            <div class="chuanchuan-explanation">
                                <p>${data.SanChuan[chuanDetails[idx]].Explanation}</p>
                                ${data.SanChuan[chuanDetails[idx]].Advice ? `<p class="chuanchuan-advice">建議：${data.SanChuan[chuanDetails[idx]].Advice}</p>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `).join('')}
                <div class="method-text">取法：${data.SanChuan.Method}</div>
            `;
            
            // 課體判斷
            const xjClass = data.XiongJi === '吉' ? 'ji' : (data.XiongJi === '凶' ? 'xiong' : 'ping');
            
            // 用神分析
            let yongShenHtml = '';
            if (data.YongShen && data.YongShen.Type) {
                const ys = data.YongShen;
                yongShenHtml = `
                    <div class="yongshen-section">
                        <h4>用神分析 (${ys.Type})</h4>
                        <div class="yongshen-content">
                            <p><strong>六親：</strong>${ys.SixRelation || '無特定'}</p>
                            <p><strong>解說：</strong>${ys.Explanation}</p>
                            <p><strong>建議：</strong>${ys.Advice}</p>
                            ${ys.TargetBranch ? `<p><strong>用神位置：</strong>${ys.TargetBranch}（${ys.TargetGeneral}）</p>` : ''}
                            ${ys.Analysis && ys.Analysis.length > 0 ? `
                                <div class="yongshen-analysis">
                                    <strong>分析要點：</strong>
                                    <ul>${ys.Analysis.map(a => `<li>${a}</li>`).join('')}</ul>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            
            let keTiHtml = '';
            if (data.KeTiDetail) {
                const d = data.KeTiDetail;
                keTiHtml = `
                    <div class="ketidetail-section">
                        <div class="ketidetail-header">
                            <span class="ketidetail-category">${d.Category}</span>
                            <span class="ketidetail-name">${d.Name}</span>
                        </div>
                        <div class="ketidetail-row">
                            <div class="ketidetail-block">
                                <h4>課體描述</h4>
                                <p>${d.Description}</p>
                            </div>
                            <div class="ketidetail-block">
                                <h4>占斷含義</h4>
                                <p>${d.Meaning}</p>
                            </div>
                        </div>
                        <div class="ketidetail-block ketidetail-features">
                            <h4>主要特徵</h4>
                            <ul>${d.Features.map(f => `<li>${f}</li>`).join('')}</ul>
                        </div>
                        <div class="ketidetail-block ketidetail-examples">
                            <h4>古籍示例</h4>
                            <ul>${d.Examples.map(ex => `<li>${ex}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('judgment').innerHTML = `
                <div class="judgment-header">
                    <div class="xiongji ${xjClass}">${data.XiongJi}</div>
                    <div class="judgment-title">課體：${data.KeTi}</div>
                </div>
                ${yongShenHtml}
                ${keTiHtml}
                <div class="duanyu-section">
                    <h4>斷語</h4>
                    ${data.DuanYu.map(dy => `<p>${dy}</p>`).join('')}
                </div>
            `;
            
            document.getElementById('results').classList.add('active');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
